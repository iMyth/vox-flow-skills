<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  /* === 基础重置 === */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #0a0a1a;
    font-family: sans-serif;
    color: #e0d5c0;
  }

  /* === Clip 容器 === */
  .clip {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    opacity: 0;
  }

  /* === 视觉元素（按需使用） === */
  .bg-glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,120,60,0.3) 0%, transparent 70%);
    filter: blur(60px);
  }
  .ring {
    position: absolute;
    border: 2px solid rgba(212,165,116,0.3);
    border-radius: 50%;
  }
  .accent-line {
    position: absolute;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d4a574, transparent);
  }
  .keyword {
    font-size: 80px;
    font-weight: 600;
    color: #d4a574;
    letter-spacing: 0.2em;
  }
  .title-text {
    font-size: 120px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #d4a574;
    text-shadow: 0 0 40px rgba(212,165,116,0.5);
  }
  .subtitle-text {
    font-size: 48px;
    color: rgba(224,213,192,0.7);
    letter-spacing: 0.15em;
    margin-top: 30px;
  }
  .scene-label {
    font-size: 36px;
    color: rgba(224,213,192,0.5);
    letter-spacing: 0.1em;
    margin-top: 20px;
  }

  /* === 调色板变量（替换为你的品牌色） === */
  /*
    暗色暖调（默认）：
      bg: #0a0a1a, fg: #e0d5c0, accent: #d4a574
    冷色悬疑：
      bg: #0a1020, fg: #c0d0e0, accent: #6488c8
    自然森林：
      bg: #0a1a0f, fg: #c0e0c8, accent: #5a9a6e
  */
</style>
</head>

<!--
  === 必填根元素属性 ===
  data-composition-id: 固定 "ai-generated"
  data-duration: 该 section 的音频真实时长（用 ffprobe 测出，秒）
  data-width / data-height: 必须 1920x1080
-->
<body data-composition-id="ai-generated" data-duration="10.0" data-width="1920" data-height="1080">

  <!--
    === 场景 1（示例） ===
    data-start: 场景开始时间（秒）
    data-duration: 场景持续时长（秒）
  -->
  <div class="clip" data-start="0" data-duration="5.0">
    <div class="bg-glow"></div>
    <div class="ring" style="width:400px;height:400px;"></div>
    <div class="ring" style="width:600px;height:600px;"></div>
    <div class="accent-line" style="width:800px;top:300px;"></div>
    <div class="accent-line" style="width:800px;bottom:300px;"></div>
    <div class="title-text">标题</div>
    <div class="subtitle-text">副标题或描述</div>
  </div>

  <!--
    === 场景 2（示例） ===
    每个场景应有不同的视觉主体和动画方向
  -->
  <div class="clip" data-start="5.0" data-duration="5.0">
    <div class="bg-glow" style="background: radial-gradient(circle, rgba(60,80,140,0.4) 0%, transparent 70%);"></div>
    <div class="ring" style="width:300px;height:300px;border-color:rgba(100,140,200,0.3);"></div>
    <div class="accent-line" style="width:600px;top:350px;background:linear-gradient(90deg, transparent, #6488c8, transparent);"></div>
    <div class="keyword">关键词</div>
    <div class="scene-label">— 场景标签 —</div>
  </div>

  <!-- GSAP CDN（必须用此版本） -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    /*
     * === GSAP Timeline（必须 paused: true） ===
     * 每个场景的动画规则：
     * 1. 用 gsap.fromTo() 或 gsap.from() 做入场
     * 2. 用 gsap.to() 只做最后一个场景退出
     * 3. 每个入场 tween 偏移 0.1-0.3s（不从 t=0 开始）
     * 4. 同一场景内至少 3 种不同的 ease
     */
    var tl = gsap.timeline({ paused: true });

    // 场景 1 动画
    tl.fromTo('[data-start="0"]', { opacity: 0 }, { opacity: 1, duration: 1.2, ease: "power2.out" }, 0);
    tl.fromTo('[data-start="0"] .title-text', { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 1.5, ease: "power3.out" }, 0.3);
    tl.fromTo('[data-start="0"] .subtitle-text', { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 1.2, ease: "power2.out" }, 0.8);
    tl.fromTo('[data-start="0"] .ring:nth-child(2)', { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 2, ease: "power1.out" }, 0.2);
    tl.fromTo('[data-start="0"] .ring:nth-child(3)', { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 2.5, ease: "power1.out" }, 0.5);
    tl.to('[data-start="0"] .ring:nth-child(2)', { rotation: 360, duration: 8, ease: "none" }, 0);
    tl.to('[data-start="0"] .ring:nth-child(3)', { rotation: -360, duration: 12, ease: "none" }, 0);

    // 场景 2 动画
    tl.fromTo('[data-start="5.0"]', { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "power2.out" }, 5.0);
    tl.fromTo('[data-start="5.0"] .keyword', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 1.5, ease: "back.out(1.7)" }, 5.2);
    tl.fromTo('[data-start="5.0"] .scene-label', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 1.0, ease: "power2.out" }, 5.5);
    tl.to('[data-start="5.0"] .ring', { rotation: 180, duration: 5, ease: "none" }, 5.0);

    // 最后场景淡出（仅最后一个场景需要）
    tl.to('[data-start="5.0"]', { opacity: 0, duration: 0.8, ease: "power2.in" }, 9.2);

    /*
     * === 必须同步注册 ===
     * 不能放在 setTimeout / async / Promise 里
     */
    window.__timelines = { 'ai-generated': tl };
    window.__hf = {
      duration: 10.0,
      seek: function(t) {
        Object.values(window.__timelines).forEach(function(tl) { tl.seek(t); });
      }
    };
  </script>

  <!--
    === Safety-Net Script（必须注入） ===
    修正 LLM 可能设错的 duration 和 timeline
  -->
  <script>
    (function() {
      var DURATION = 10.0; // ← 替换为音频真实时长
      window.__timelines = window.__timelines || {};
      if (!window.__timelines['ai-generated']) {
        if (typeof gsap !== 'undefined') {
          window.__timelines['ai-generated'] = gsap.timeline({ paused: true });
        } else {
          window.__timelines['ai-generated'] = { seek: function() {}, duration: function() { return DURATION; } };
        }
      }
      window.__hf = window.__hf || {};
      window.__hf.duration = DURATION;
      if (!window.__hf.seek) {
        window.__hf.seek = function(time) {
          if (window.__timelines) {
            Object.values(window.__timelines).forEach(function(tl) {
              if (tl && typeof tl.seek === 'function') tl.seek(time);
            });
          }
        };
      }
    })();
  </script>
</body>
</html>
